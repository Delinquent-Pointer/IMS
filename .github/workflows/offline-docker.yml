name: Build Offline Docker Bundle

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish app
        run: dotnet publish -c Release -o ./myapp

      - name: Build Docker image
        run: docker build -t ims-offline:${{ github.sha }} .

      - name: Save Docker image
        run: docker save ims-offline:${{ github.sha }} | gzip > ims-offline.tar.gz

      - name: Save SQL Server image
        run: |
          docker pull mcr.microsoft.com/mssql/server:2019-latest
          docker save mcr.microsoft.com/mssql/server:2019-latest | gzip > sqlserver.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: offline-images
          path: |
            ims-offline.tar.gz
            sqlserver.tar.gz
      
            - name: Mark Offline Bundle as Deployment
            uses: actions/github-script@v6
            with:
              script: |
                const deployment = await github.repos.createDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: context.sha,
                  required_contexts: [],
                  environment: "offline-bundle",
                  description: "Docker images for offline IMS deployment",
                  transient_environment: false,
                  auto_merge: false,
                  production_environment: false
                });
          
                await github.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.data.id,
                  state: "success",
                  log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  description: "Offline bundle ready for download",
                  environment_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                });
          

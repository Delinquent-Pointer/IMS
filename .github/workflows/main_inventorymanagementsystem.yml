name: Build, deploy & package offline images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1) Build & publish your .NET app
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build (Release)
        run: dotnet build --configuration Release

      - name: Publish to folder
        run: dotnet publish -c Release -o "${{ env.DOTNET_ROOT }}/myapp"

      - name: Upload published app
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-publish
          path: ${{ env.DOTNET_ROOT }}/myapp

  # ─────────────────────────────────────────────────────────────────────────────
  # 2) Deploy to Azure Web App
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download published app
        uses: actions/download-artifact@v4
        with:
          name: dotnet-publish
          path: ./myapp

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7F8EB15A0F3F4426AA5DE2C0921189C7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DE9A67F36DF54CB196DF4FF723FE63D0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E01D85030F5748A99F37433AD2BA8580 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name:   InventoryManagementSystem
          slot-name:  Production
          # point at the folder containing your published dlls
          package:    ./myapp

  # ─────────────────────────────────────────────────────────────────────────────
  # 3) Build offline Docker images (web + SQL) as tarballs
  # ─────────────────────────────────────────────────────────────────────────────
  offline:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download published app
        uses: actions/download-artifact@v4
        with:
          name: dotnet-publish
          path: ./myapp

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build web Docker image
        run: |
          docker build \
            --file ./myapp/Dockerfile \
            --tag ims-offline:${{ github.sha }} \
            ./myapp

      - name: Save & zip web image
        run: |
          docker save ims-offline:${{ github.sha }} -o web.tar
          zip ims-offline_${{ github.sha }}.zip web.tar

      - name: Pull, save & zip SQL Server image
        run: |
          docker pull mcr.microsoft.com/mssql/server:2019-latest
          docker save mcr.microsoft.com/mssql/server:2019-latest -o sql.tar
          zip sqlserver_2019.zip sql.tar

      - name: Upload offline images
        uses: actions/upload-artifact@v4
        with:
          name: offline-images
          path: |
            ims-offline_${{ github.sha }}.zip
            sqlserver_2019.zip
